<nz-layout class="app-layout">
  <nz-sider
    class="menu-sidebar"
    nzCollapsible
    nzWidth="256px"
    nzBreakpoint="md"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null"
  >
    <div class="sidebar-logo">
      <a>
        <nz-icon nzType="calendar" nzTheme="fill" style="font-size: 26px; color: #722ed1"></nz-icon>
        <h1>Planora</h1>
      </a>
    </div>
    <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed">
      <li nz-menu-item nzMatchRouter>
        <a routerLink="/dashboard">
          <nz-icon nzType="dashboard"></nz-icon>
          <span>{{ 'menu.dashboard' | translate }}</span>
        </a>
      </li>

      <li nz-menu-item nzMatchRouter>
        <a routerLink="/plans">
          <nz-icon nzType="calendar"></nz-icon>
          <span>{{ 'menu.plans' | translate }}</span>
        </a>
      </li>

      <li nz-menu-item nzMatchRouter>
        <a routerLink="/goals">
          <nz-icon nzType="check-circle"></nz-icon>
          <span>{{ 'menu.goals' | translate }}</span>
        </a>
      </li>
    </ul>
  </nz-sider>
  <nz-layout>
    <nz-header>
      <div class="app-header">
        <!-- SOL -->
        <div class="header-left">
          <span class="header-trigger" (click)="isCollapsed = !isCollapsed">
            <nz-icon class="trigger" [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"></nz-icon>
          </span>

          <span class="header-date"> Pazartesi, 27 Nisan 2026 </span>
        </div>

        <div class="header-right">
          <button
            class="language-button"
            nz-button
            nz-dropdown
            nzTrigger="click"
            [nzDropdownMenu]="languageMenu"
            [nzPlacement]="'bottomRight'"
          >
            <img
              class="language-flag-img"
              [src]="
                currentLanguage === 'tr'
                  ? 'https://flagcdn.com/w40/tr.png'
                  : 'https://flagcdn.com/w40/us.png'
              "
              alt="language flag"
            />

            <span class="language-text">
              {{ currentLanguage === 'tr' ? 'Türkçe' : 'English' }}
            </span>

            <nz-icon nzType="down" class="language-arrow"></nz-icon>
          </button>

          <nz-dropdown-menu #languageMenu="nzDropdownMenu">
            <ul nz-menu class="language-menu">
              <li nz-menu-item (click)="changeLanguage('tr')">
                <span class="language-option">
                  <img
                    class="language-flag-img"
                    src="https://flagcdn.com/w40/tr.png"
                    alt="Turkish"
                  />
                  <span>Türkçe</span>
                </span>
              </li>

              <li nz-menu-item (click)="changeLanguage('en')">
                <span class="language-option">
                  <img
                    class="language-flag-img"
                    src="https://flagcdn.com/w40/us.png"
                    alt="English"
                  />
                  <span>English</span>
                </span>
              </li>
            </ul>
          </nz-dropdown-menu>
        </div>
      </div>
    </nz-header>
    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
